<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゆきだまのホームページ A館</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "MS Gothic", "Osaka", monospace;
      background-image: url("images/pg.png");
      background-repeat: repeat;
      background-size: 600px;
      color: #000000;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 200px;
      min-width: 100px;
      background-color: #ffffff;
      border-right: 1px solid #ccc;
      padding: 20px;
      font-size: 14px;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      padding: 6px 0;
      color: blue;
      text-decoration: none;
      font-weight: bold;
    }

    .sidebar a::before {
      content: "";
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #999;
      margin-right: 8px;
    }

    .resizer {
      width: 5px;
      cursor: ew-resize;
      background-color: #ccc;
    }

    .main {
      flex: 1;
      padding: 40px 20px;
      overflow-y: auto;
      background-color: rgba(255, 255, 255, 0.65);
    }

    .content {
      display: flex;
      align-items: flex-start;
      gap: 32px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .image-block img {
      width: 360px;
      height: auto;
      margin-left: 60px;
      display: block;
    }

    .image-block p {
      font-size: 14px;
      margin: 4px 0 0;
      text-align: center;
    }

    .text-block {
      flex: 1;
      text-align: center;
    }

    .text-block h1 {
      font-size: 32px;
      margin: 0 0 8px;
    }

    .text-block hr {
      margin: 20px auto;
      width: 80%;
    }

    /* ★ 掲示板プレビュー用のスタイル */
    #recent-bbs {
      margin-top: 20px;
      text-align: left;
      background: rgba(255, 255, 255, 0.5);
      padding: 15px;
      border: 1px solid #999;
      border-radius: 4px;
      font-size: 13px;
    }

    #recent-bbs h2 {
      font-size: 16px;
      margin-top: 0;
      border-bottom: 1px solid #999;
      padding-bottom: 5px;
    }

    .recent-post {
      border-bottom: 1px dotted #ccc;
      padding: 8px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-post:last-child {
      border-bottom: none;
    }

    .recent-post .post-body {
      color: #333;
    }

    .more-link {
      display: block;
      text-align: right;
      margin-top: 10px;
      font-size: 12px;
      color: blue;
      text-decoration: underline;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <nav class="sidebar" id="sidebar"></nav>

  <div class="resizer" id="resizer"></div>

  <div class="main">
    <div class="content">
      <div class="image-block">
        <img src="images/topyk.png" alt="タイトル画像">
        <p>イラスト：<a href="illustcreator.html">supica-0325cさん</a></p>
        <p>イラストは、随時切り替わります！</p> 
      </div>
      <div class="text-block">
        <h1>ゆきだまのホームページ A館</h1>
        <hr>
        <p>ゆきだまのホームページへようこそ！</p>
        <p>こちらは、ゆきだまの情報を発信するために作成したホームページです。</p>
        
        <section id="recent-bbs">
          <h2>掲示板の最新投稿</h2>
          <div id="bbs-preview">読み込み中...</div>
          <a href="bbs.html" class="more-link">もっと見る »</a>
        </section>

        <hr>
        <footer>
          <p>© 2026 ゆきだま. All rights reserved.</p>
        </footer>
      </div>
    </div>
  </div>

  <script src="js/load-sidebar.js"></script>

  <script>
    /* サイドバーのリサイズ機能 */
    const resizer = document.getElementById('resizer');
    const sidebar = document.getElementById('sidebar');
    let isResizing = false;

    resizer.addEventListener('mousedown', function () {
      isResizing = true;
      document.body.style.cursor = 'ew-resize';
      document.body.style.userSelect = 'none'; 
    });

    document.addEventListener('mousemove', function (e) {
      if (!isResizing) return;
      const newWidth = e.clientX;
      if (newWidth > 100 && newWidth < 600) {
        sidebar.style.width = newWidth + 'px';
      }
    });

    document.addEventListener('mouseup', function () {
      isResizing = false;
      document.body.style.cursor = 'default';
      document.body.style.userSelect = 'auto';
    });

    /* ★ 掲示板の最新3件を取得して表示するスクリプト */
    function loadRecentBBS() {
      const previewArea = document.getElementById('bbs-preview');

      fetch('bbs_logs.html?t=' + new Date().getTime())
        .then(response => {
          if (!response.ok) throw new Error('ログが見つかりません');
          return response.text();
        })
        .then(data => {
          const tempDiv = document.createElement('div');
          // CONTENTS_STARTを削除してパース
          tempDiv.innerHTML = data.replace('CONTENTS_START', '');
          
          const posts = tempDiv.querySelectorAll('.post');
          if (posts.length === 0) {
            previewArea.innerText = "書き込みはまだありません。";
            return;
          }

          previewArea.innerHTML = '';
          // 最新の3件（最初から3つ）を取得
          for (let i = 0; i < Math.min(posts.length, 3); i++) {
            const post = posts[i];
            const name = post.querySelector('strong') ? post.querySelector('strong').innerText : "名無しさん";
            const body = post.querySelector('.post-body') ? post.querySelector('.post-body').innerText : "";
            
            const div = document.createElement('div');
            div.className = 'recent-post';
            // 名前：メッセージ の形式で表示
            div.innerHTML = `<strong>${name}</strong>: <span class="post-body">${body.replace(/\n/g, ' ')}</span>`;
            previewArea.appendChild(div);
          }
        })
        .catch(err => {
          previewArea.innerText = "読み込みに失敗しました。";
          console.error(err);
        });
    }

    // 実行
    loadRecentBBS();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゆきだまのホームページ A館</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "MS Gothic", "Osaka", monospace;
      background-image: url("images/pg.png");
      background-repeat: repeat;
      background-size: 600px;
      color: #000000;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 200px;
      min-width: 100px;
      background-color: #ffffff;
      border-right: 1px solid #ccc;
      padding: 20px;
      font-size: 14px;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      padding: 6px 0;
      color: blue;
      text-decoration: none;
      font-weight: bold;
    }

    .sidebar a::before {
      content: "";
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #999;
      margin-right: 8px;
    }

    .resizer {
      width: 5px;
      cursor: ew-resize;
      background-color: #ccc;
    }

    .main {
      flex: 1;
      padding: 40px 20px;
      overflow-y: auto;
      background-color: rgba(255, 255, 255, 0.65);
    }

    .content {
      display: flex;
      align-items: flex-start;
      gap: 32px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .image-block img {
      width: 360px;
      height: auto;
      margin-left: 60px;
      display: block;
    }

    .image-block p {
      font-size: 14px;
      margin: 4px 0 0;
      text-align: center;
    }

    .text-block {
      flex: 1;
      text-align: center;
    }

    .text-block h1 {
      font-size: 32px;
      margin: 0 0 8px;
    }

    .text-block hr {
      margin: 20px auto;
      width: 80%;
    }

    /* アクセスカウンターエリアのスタイル */
    #counter-area {
      margin: 20px auto;
      padding: 15px;
      background: #000; /* 7セグが映えるように背景黒 */
      border: 3px double #999;
      display: inline-block;
      line-height: 0;
    }

    .counter-label {
      color: #fff;
      font-size: 12px;
      display: block;
      margin-bottom: 8px;
      line-height: 1.2;
      font-family: sans-serif;
    }

    .counter-digits img {
      height: 30px; /* 画像の高さに合わせて調整してください */
      width: auto;
      margin: 0 1px;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <nav class="sidebar" id="sidebar"></nav>
  <div class="resizer" id="resizer"></div>

  <div class="main">
    <div class="content">
      <div class="image-block">
        <img src="images/topyk.png" alt="タイトル画像">
        <p>イラスト：<a href="illustcreator.html">supica-0325cさん</a></p>
        <p>イラストは、随時切り替わります！</p> 
      </div>
      <div class="text-block">
        <h1>ゆきだまのホームページ A館</h1>
        <hr>
        <p>ゆきだまのホームページへようこそ！</p>
        <p>こちらは、ゆきだまの情報を発信するために作成したホームページです。</p>
        
        <div id="counter-area">
          <div id="counter-display" class="counter-digits">
            Loading...
          </div>
        </div>

        <hr>
        <footer>
          <p>© 2026 ゆきだま. All rights reserved.</p>
        </footer>
      </div>
    </div>
  </div>

  <script src="js/load-sidebar.js"></script>

  <script>
    /* サイドバーのリサイズ機能 */
    const resizer = document.getElementById('resizer');
    const sidebar = document.getElementById('sidebar');
    let isResizing = false;

    resizer.addEventListener('mousedown', function () {
      isResizing = true;
      document.body.style.cursor = 'ew-resize';
      document.body.style.userSelect = 'none'; 
    });

    document.addEventListener('mousemove', function (e) {
      if (!isResizing) return;
      const newWidth = e.clientX;
      if (newWidth > 100 && newWidth < 600) {
        sidebar.style.width = newWidth + 'px';
      }
    });

    document.addEventListener('mouseup', function () {
      isResizing = false;
      document.body.style.cursor = 'default';
      document.body.style.userSelect = 'auto';
    });

    /* アクセスカウンター取得・表示スクリプト */
    async function loadCounter() {
      const displayArea = document.getElementById('counter-display');
      const WORKER_URL = 'https://dry-silence-4f1f.y-bb0.workers.dev';
      const IMAGE_PATH = 'akusesu_kaunta_moji_sozai/'; // 画像フォルダのパス

      try {
        const response = await fetch(WORKER_URL);
        const data = await response.json();
        const countStr = String(data.count).padStart(6, '0'); // 6桁で0埋め

        displayArea.innerHTML = ''; // 読み込み中テキストを消去

        // 数字一文字ずつを画像に置き換えて配置
        for (let char of countStr) {
          const img = document.createElement('img');
          img.src = `${IMAGE_PATH}${char}.png`;
          img.alt = char;
          displayArea.appendChild(img);
        }
      } catch (err) {
        console.error('Counter Load Error:', err);
        displayArea.innerText = "Error";
        displayArea.style.color = "red";
      }
    }

    loadCounter();
  </script>
</body>
</html>

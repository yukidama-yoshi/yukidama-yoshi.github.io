<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゆきだまのホームページ</title>
  
<link rel="stylesheet" href="css/common.css">
 
</head>
<body>

  <div class="version-tag">Ver 1.6</div>

  <nav class="sidebar" id="sidebar"></nav>
  
  <div class="resizer" id="resizer"></div>

  <div class="main">
    <div class="content">
      <div class="image-block">
        <img src="images/topyk.png" alt="タイトル画像">
        <p>イラスト：<a href="illustcreator.html">supica-0325cさん</a></p>
        <p>イラストは、随時切り替わります！</p> 
      </div>
      <div class="text-block">
        <h1>ゆきだまのホームページ A館</h1>
        <hr>
        <p>ゆきだまのホームページへようこそ！</p>
        <p style="color: red; font-weight: bold;">⚠ただいま工事中です。一部ページで不具合や表示崩れが発生しています⚠</p>
        
        <hr>
        <footer>
          <p>© 2026 ゆきだま. All rights reserved.</p>
        </footer>
      </div>
    </div>
  </div>

  <script src="js/load-sidebar.js"></script>

  <script>
    /* サイドバーリサイズ機能 */
    const resizer = document.getElementById('resizer');
    const sidebarEl = document.getElementById('sidebar');
    let isResizing = false;

    resizer.addEventListener('mousedown', () => { 
      isResizing = true; 
      document.body.style.cursor = 'ew-resize'; 
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      // 100px〜600pxの間でサイズ変更可能
      if (e.clientX > 100 && e.clientX < 600) {
        sidebarEl.style.width = e.clientX + 'px';
      }
    });

    document.addEventListener('mouseup', () => { 
      isResizing = false; 
      document.body.style.cursor = 'default'; 
    });

    /* 管理者モード（URLに ?admin=1 をつけた時用） */
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('admin') === '1') {
      localStorage.setItem('is_admin_yukidama', 'true');
      alert("管理者モードを有効にしました。以降カウントされません。");
    }
  </script>
</body>
</html>

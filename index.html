<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゆきだまのホームページ A館</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "MS Gothic", "Osaka", monospace;
      background-image: url("images/pg.png");
      background-repeat: repeat;
      background-size: 600px;
      color: #000000;
      height: 100vh;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* バージョン表記 */
    .version-tag {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 11px;
      color: #666;
      background: rgba(255, 255, 255, 0.5);
      padding: 2px 6px;
      border: 1px solid #ccc;
      border-radius: 3px;
      z-index: 100;
    }

    .sidebar {
      width: 200px;
      min-width: 100px;
      background-color: #ffffff;
      border-right: 1px solid #ccc;
      padding: 20px;
      font-size: 14px;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      padding: 6px 0;
      color: blue;
      text-decoration: none;
      font-weight: bold;
    }

    .sidebar a::before {
      content: "";
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #999;
      margin-right: 8px;
    }

    .resizer {
      width: 5px;
      cursor: ew-resize;
      background-color: #ccc;
    }

    .main {
      flex: 1;
      padding: 40px 20px;
      overflow-y: auto;
      background-color: rgba(255, 255, 255, 0.65);
    }

    .content {
      display: flex;
      align-items: flex-start;
      gap: 32px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .image-block img {
      width: 360px;
      height: auto;
      margin-left: 60px;
      display: block;
    }

    .image-block p {
      font-size: 14px;
      margin: 4px 0 0;
      text-align: center;
    }

    .text-block {
      flex: 1;
      text-align: center;
    }

    .text-block h1 {
      font-size: 32px;
      margin: 0 0 8px;
    }

    .text-block hr {
      margin: 20px auto;
      width: 80%;
    }

    /* --- カウンター & Twitter報告エリア --- */
    .counter-container {
      margin: 20px auto;
      text-align: center;
    }

    .counter-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #counter-area {
      margin: 0 8px;
      padding: 6px;
      background: #000; 
      border: 2px inset #ccc;
      display: inline-block;
      line-height: 0; 
    }

    .counter-digits {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: -4px; 
    }

    .counter-digits img {
      height: 32px;
      width: auto;
      display: block;
      margin: 0 -2px; 
      padding: 0;
      image-rendering: pixelated;
    }

    .kiriban-note {
      font-size: 12px;
      color: #444;
      line-height: 1.6;
    }

    .kiriban-note a {
      color: #1da1f2;
      text-decoration: underline;
      font-weight: bold;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="version-tag">Ver 1.6</div>

  <nav class="sidebar" id="sidebar"></nav>
  <div class="resizer" id="resizer"></div>

  <div class="main">
    <div class="content">
      <div class="image-block">
        <img src="images/topyk.png" alt="タイトル画像">
        <p>イラスト：<a href="illustcreator.html">supica-0325cさん</a></p>
        <p>イラストは、随時切り替わります！</p> 
      </div>
      <div class="text-block">
        <h1>ゆきだまのホームページ A館</h1>
        <hr>
        <p>ゆきだまのホームページへようこそ！</p>
        
        <div class="counter-container">
          <div class="counter-wrapper">
            あなたは 
            <div id="counter-area">
              <div id="counter-display" class="counter-digits"></div>
            </div>
            人目のお客様です！
          </div>
          
          <p class="kiriban-note">
            キリ番・ゾロ目を踏んだ方は、<br>
            各自<a id="twitter-share" href="#" target="_blank" rel="noopener">Twitter（X）に報告</a>してくれると嬉しいです。
          </p>
        </div>

        <hr>
        <footer>
          <p>© 2026 ゆきだま. All rights reserved.</p>
        </footer>
      </div>
    </div>
  </div>

  <script src="js/load-sidebar.js"></script>

  <script>
    /* サイドバーリサイズ */
    const resizer = document.getElementById('resizer');
    const sidebar = document.getElementById('sidebar');
    let isResizing = false;

    resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'ew-resize'; });
    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      if (e.clientX > 100 && e.clientX < 600) sidebar.style.width = e.clientX + 'px';
    });
    document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; });

    /* カウンター読み込み & Twitterリンク生成 (管理者除外対応) */
    async function loadCounter() {
      const displayArea = document.getElementById('counter-display');
      const twitterLink = document.getElementById('twitter-share');
      const WORKER_URL = 'https://dry-silence-4f1f.y-bb0.workers.dev';
      const IMAGE_PATH = 'akusesu_kaunta_moji_sozai/';
      const SITE_URL = window.location.href;

      // URLに ?admin=1 をつけて一度アクセスすると、そのブラウザを管理者として記憶
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('admin') === '1') {
        localStorage.setItem('is_admin_yukidama', 'true');
        alert("管理者モードを有効にしました。以降カウントされません。");
      }
      const isAdmin = localStorage.getItem('is_admin_yukidama') === 'true';

      try {
        // 管理者の場合は no-count=1 を付与してfetch
        const fetchUrl = isAdmin ? `${WORKER_URL}?no-count=1` : WORKER_URL;
        const response = await fetch(fetchUrl);
        const data = await response.json();
        const countStr = String(data.count).padStart(6, '0');

        // ツイート内容：本文 → URL → 空行 → メンション
        const tweetText = `「ゆきだまのホームページ」でキリ番（${countStr}）を踏んだよ！\n${SITE_URL}\n\n@yukidama_yoshi`;
        twitterLink.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText)}`;

        displayArea.innerHTML = ''; 
        for (let char of countStr) {
          const img = document.createElement('img');
          img.src = `${IMAGE_PATH}${char}.png`;
          img.alt = char;
          displayArea.appendChild(img);
        }
      } catch (err) {
        displayArea.innerHTML = '<span style="color:#f00; font-size:10px;">ERR</span>';
      }
    }

    loadCounter();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゆきだまのホームページ A館</title>
  
  <link rel="stylesheet" href="css/common.css">

  <style>
    /* index.html 固有のスタイルのみ記述 */
    body {
      margin: 0;
      padding: 0;
      font-family: "MS Gothic", "Osaka", monospace;
      background-image: url("images/pg.png");
      background-repeat: repeat;
      background-size: 600px;
      color: #000000;
      height: 100vh;
      display: flex; /* これがサイドバーとメインを横に並べる魔法 */
      overflow: hidden;
      position: relative;
    }

    /* バージョン表記 */
    .version-tag {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 11px;
      color: #666;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 2px 6px;
      z-index: 100;
    }

    /* リサイズ用の境界線 */
    .resizer {
      width: 5px;
      cursor: ew-resize;
      background-color: #ccc;
      flex-shrink: 0;
    }

    .main {
      flex: 1;
      padding: 40px 20px;
      overflow-y: auto;
      background-color: rgba(255, 255, 255, 0.65);
    }

    /* メインコンテンツのレイアウト */
    .content {
      display: flex;
      align-items: flex-start;
      gap: 32px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .image-block img {
      width: 360px;
      height: auto;
      margin-left: 60px;
      display: block;
    }

    .image-block p {
      font-size: 14px;
      margin: 4px 0 0;
      text-align: center;
    }

    .text-block {
      flex: 1;
      text-align: center;
    }

    .text-block h1 {
      font-size: 32px;
      margin: 0 0 8px;
    }

    .text-block hr {
      margin: 20px auto;
      width: 80%;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="version-tag">Ver 1.6</div>

  <nav class="sidebar" id="sidebar"></nav>
  
  <div class="resizer" id="resizer"></div>

  <div class="main">
    <div class="content">
      <div class="image-block">
        <img src="images/topyk.png" alt="タイトル画像">
        <p>イラスト：<a href="illustcreator.html">supica-0325cさん</a></p>
        <p>イラストは、随時切り替わります！</p> 
      </div>
      <div class="text-block">
        <h1>ゆきだまのホームページ A館</h1>
        <hr>
        <p>ゆきだまのホームページへようこそ！</p>
        <p style="color: red; font-weight: bold;">⚠ただいま工事中です。一部ページで不具合や表示崩れが発生しています⚠</p>
        
        <hr>
        <footer>
          <p>© 2026 ゆきだま. All rights reserved.</p>
        </footer>
      </div>
    </div>
  </div>

  <script src="js/load-sidebar.js"></script>

  <script>
    /* サイドバーリサイズ機能 */
    const resizer = document.getElementById('resizer');
    const sidebarEl = document.getElementById('sidebar');
    let isResizing = false;

    resizer.addEventListener('mousedown', () => { 
      isResizing = true; 
      document.body.style.cursor = 'ew-resize'; 
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      // 100px〜600pxの間でサイズ変更可能
      if (e.clientX > 100 && e.clientX < 600) {
        sidebarEl.style.width = e.clientX + 'px';
      }
    });

    document.addEventListener('mouseup', () => { 
      isResizing = false; 
      document.body.style.cursor = 'default'; 
    });

    /* 管理者モード（URLに ?admin=1 をつけた時用） */
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('admin') === '1') {
      localStorage.setItem('is_admin_yukidama', 'true');
      alert("管理者モードを有効にしました。以降カウントされません。");
    }
  </script>
</body>
</html>

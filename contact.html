<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>連絡先 - ゆきだまのホームページ</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body>

  <nav class="sidebar" id="sidebar"></nav>

  <div class="resizer" id="resizer"></div>

  <div class="main">
    <div class="contact-container">
      <h1>連絡先</h1>
      <hr>
      <p>このホームページに関するご意見・ご感想などは、</p>
      <p><a href="https://twitter.com/yukidama_yoshi" target="_blank" rel="noopener noreferrer">Twitter（X）</a>にてどうぞ。</p>
      <p class="notice">※返信は保証されません</p>
      <hr>
      <footer>
        <p>© 2026 yukidama-yoshi. All rights reserved.</p>
      </footer>
    </div>
  </div>

  <script src="js/load-sidebar.js"></script>

  <script>
    /* サイドバーリサイズ機能（すべてのページ共通の処理） */
    const resizer = document.getElementById('resizer');
    const sidebar = document.getElementById('sidebar');
    let isResizing = false;

    resizer.addEventListener('mousedown', function () {
      isResizing = true;
      document.body.style.cursor = 'ew-resize';
      document.body.style.userSelect = 'none'; 
    });

    document.addEventListener('mousemove', function (e) {
      if (!isResizing) return;
      const newWidth = e.clientX;
      if (newWidth > 100 && newWidth < 600) {
        sidebar.style.width = newWidth + 'px';
      }
    });

    document.addEventListener('mouseup', function () {
      isResizing = false;
      document.body.style.cursor = 'default';
      document.body.style.userSelect = 'auto';
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>掲示板(モバイル版) - ゆきだまのホームページ A館</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
    }

    /* ヘッダー */
    header {
      background: #fff;
      padding: 10px;
      text-align: center;
      border-bottom: 2px solid #ccc;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    header h1 { font-size: 18px; margin: 0; color: #000; }
    .nav { margin-top: 8px; font-size: 13px; }
    .nav a { color: blue; text-decoration: none; margin: 0 10px; font-weight: bold; }

    .container { padding: 12px; }

    /* 投稿フォーム */
    .post-form {
      background: #fff;
      border: 1px solid #999;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .post-form h2 { font-size: 15px; margin: 0 0 12px 0; border-left: 4px solid #333; padding-left: 8px; }
    
    input[type="text"], textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px; /* iOSのズーム防止 */
    }

    .char-count {
      text-align: right;
      font-size: 11px;
      color: #666;
      margin-bottom: 8px;
    }
    .char-over { color: red; font-weight: bold; }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #444;
      color: #fff;
      border: none;
      font-weight: bold;
      font-size: 16px;
      border-radius: 4px;
    }
    .submit-btn:disabled { background: #ccc; }

    /* 掲示板ログ */
    .log-container {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      min-height: 200px;
    }
    .log-header {
      padding: 10px;
      background: #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      border-bottom: 1px solid #ccc;
    }

    .post {
      padding: 15px;
      border-bottom: 1px solid #eee;
    }
    .post:last-child { border-bottom: none; }

    .post-info {
      font-size: 12px;
      color: #666;
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .post-name { font-weight: bold; color: #000000; font-size: 14px; }
    .admin-label { color: #fff; background: #e91e63; padding: 1px 4px; border-radius: 3px; font-size: 10px; margin-left: 4px; }

    .post-content {
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .reply-btn {
      color: #007bff;
      text-decoration: none;
      font-weight: bold;
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }

    .anchor-link { color: blue; font-weight: bold; text-decoration: underline; cursor: pointer; }
    .status-msg { text-align: center; padding: 20px; font-size: 14px; }
    footer { text-align: center; padding: 20px; font-size: 11px; color: #999; }
  </style>
</head>
<body>

<header>
  <h1>ゆきだまのホームページ 掲示板</h1>
  <div class="nav">
    <a href="index.html">トップ</a>
    <a href="#" onclick="fetchLogs(); return false;">更新</a>
  </div>
</header>

<div class="container">
  <section class="post-form">
    <h2>掲示板に書く</h2>
    <input type="text" id="m-name" placeholder="名前 (空欄で名無し)" maxlength="20">
    <div id="m-name-count" class="char-count">0/20</div>
    
    <textarea id="m-message" placeholder="内容を入力してください" rows="4" maxlength="300"></textarea>
    <div id="m-msg-count" class="char-count">0/300</div>
    
    <button class="submit-btn" onclick="submitMobile()" id="m-submit">投稿する</button>
    <p id="m-status" style="font-size:12px; text-align:center; margin-top:8px; font-weight:bold;"></p>
  </section>

  <section class="log-container">
    <div class="log-header">
      <span id="m-count">読み込み中...</span>
      <select id="m-sort" onchange="fetchLogs()">
        <option value="desc">最新順</option>
        <option value="asc">投稿順</option>
      </select>
    </div>
    <div id="m-display"></div>
  </section>
</div>

<footer>&copy; 2026 ゆきだま</footer>

<script>
  const WORKER_URL = 'https://dry-silence-4f1f.y-bb0.workers.dev';
  const nameInput = document.getElementById('m-name');
  const msgInput = document.getElementById('m-message');

  // 文字数カウント
  nameInput.oninput = () => {
    const len = nameInput.value.length;
    document.getElementById('m-name-count').innerText = `${len}/20`;
    document.getElementById('m-name-count').className = len > 20 ? "char-count char-over" : "char-count";
  };
  msgInput.oninput = () => {
    const len = msgInput.value.length;
    document.getElementById('m-msg-count').innerText = `${len}/300`;
    document.getElementById('m-msg-count').className = len > 300 ? "char-count char-over" : "char-count";
  };

  // ログ読み込み
  function fetchLogs() {
    const display = document.getElementById('m-display');
    const sort = document.getElementById('m-sort').value;
    
    display.innerHTML = `
      <div class="status-msg">
        <img src="bbs_parts/loading.gif" alt="" style="height: 1.2em; vertical-align: middle; margin-right: 8px;">
        読み込み中...
      </div>`;
    
    fetch(WORKER_URL)
      .then(res => res.json())
      .then(posts => {
        document.getElementById('m-count').textContent = posts.length + "件の投稿";
        if (sort === 'asc') posts.reverse();

        display.innerHTML = '';
        if (posts.length === 0) {
          display.innerHTML = '<div class="status-msg">書き込みがありません。</div>';
          return;
        }

        posts.forEach(p => {
          const isAdmin = p.name === 'ゆきだま' ? '<span class="admin-label">管理人</span>' : '';
          
          const div = document.createElement('div');
          div.className = 'post';
          div.id = 'p' + p.no;
          div.innerHTML = `
            <div class="post-info">
              <span>No.${p.no} <span class="post-name">${escapeHtml(p.name || "名無しさん")}</span>${isAdmin}</span>
              <span class="reply-btn" onclick="setReply(${p.no})">返信</span>
            </div>
            <div class="post-content">${processMessage(p.message)}</div>
            <div style="font-size:10px; color:#999; margin-top:5px; text-align:right;">[${p.date}]</div>
          `;
          display.appendChild(div);
        });
      })
      .catch(err => {
        display.innerHTML = `<div class="status-msg" style="color:red;">読み込み失敗: ${err.message}</div>`;
      });
  }

  function processMessage(text) {
    let html = escapeHtml(text);
    // URL
    html = html.replace(/(https?:\/\/[\w?=&.\/-;#~%-]+)/g, url => `<a href="jump.html?url=${encodeURIComponent(url)}" target="_blank">${url}</a>`);
    // アンカー
    html = html.replace(/(?:&gt;&gt;|>>)(\d+)/g, (m, p1) => `<span class="anchor-link" onclick="jumpTo(${p1})">>>${p1}</span>`);
    return html;
  }

  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function setReply(no) {
    msgInput.value = ">>" + no + "\n" + msgInput.value;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    msgInput.focus();
    msgInput.dispatchEvent(new Event('input'));
  }

  function jumpTo(no) {
    const el = document.getElementById('p' + no);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.backgroundColor = '#fff9c4';
      setTimeout(() => el.style.backgroundColor = 'transparent', 2000);
    } else {
      alert("No." + no + "は見つかりませんでした。");
    }
  }

  async function submitMobile() {
    const btn = document.getElementById('m-submit');
    const status = document.getElementById('m-status');
    const name = nameInput.value.trim();
    const message = msgInput.value.trim();

    if (!message) return alert("内容を入力してください");
    if (name.length > 20 || message.length > 300) return alert("文字数制限を超えています");

    btn.disabled = true;
    status.style.color = "black";
    status.innerText = "送信中...";

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, message })
      });

      if (res.ok) {
        status.style.color = "green";
        status.innerText = "投稿完了！";
        msgInput.value = "";
        msgInput.dispatchEvent(new Event('input'));
        setTimeout(() => { status.innerText = ""; fetchLogs(); }, 1500);
      } else {
        const data = await res.json();
        throw new Error(data.error || "送信失敗");
      }
    } catch (e) {
      status.style.color = "red";
      status.innerText = "エラー: " + e.message;
    } finally {
      btn.disabled = false;
    }
  }

  // 初回読み込み
  fetchLogs();
</script>
</body>
</html>

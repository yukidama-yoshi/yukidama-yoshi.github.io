<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>掲示板(モバイル版) - ゆきだまのホームページ A館</title>
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background-color: #f4f4f4; color: #333; }
    header { background: #fff; padding: 10px; text-align: center; border-bottom: 2px solid #ccc; position: sticky; top: 0; z-index: 1000; }
    header h1 { font-size: 18px; margin: 0; }
    .nav { margin-top: 8px; font-size: 13px; }
    .nav a { color: blue; text-decoration: none; margin: 0 10px; font-weight: bold; }
    .container { padding: 12px; }
    .post-form { background: #fff; border: 1px solid #999; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
    .post-form h2 { font-size: 15px; margin: 0 0 12px 0; border-left: 4px solid #333; padding-left: 8px; }
    input[type="text"], textarea { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
    .char-count { text-align: right; font-size: 11px; color: #666; margin-bottom: 8px; }
    .submit-btn { width: 100%; padding: 12px; background: #444; color: #fff; border: none; font-weight: bold; font-size: 16px; border-radius: 4px; }
    .log-container { background: #fff; border: 1px solid #ccc; border-radius: 8px; }
    .log-header { padding: 10px; background: #eee; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border-bottom: 1px solid #ccc; }
    .post { padding: 15px; border-bottom: 1px solid #eee; }
    .post-info { font-size: 12px; color: #666; display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
    .post-name { font-weight: bold; color: #000; font-size: 14px; }
    .admin-icon { width: 18px; height: 18px; vertical-align: middle; margin-left: 4px; border: 1px solid #ccc; }
    .post-content { font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
    .reply-btn { color: #007bff; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .status-msg { text-align: center; padding: 20px; font-size: 14px; }
    footer { text-align: center; padding: 20px; font-size: 11px; color: #999; }
  </style>
</head>
<body>
<header>
  <h1>掲示板 (モバイル版)</h1>
  <div class="nav"><a href="index.html">トップ</a><a href="#" onclick="fetchLogs(); return false;">更新</a></div>
</header>
<div class="container">
  <section class="post-form">
    <h2>掲示板に書く</h2>
    <input type="text" id="m-name" placeholder="名前" maxlength="40">
    <div id="m-name-count" class="char-count">0/20</div>
    <textarea id="m-message" placeholder="内容を入力してください" rows="4" maxlength="300"></textarea>
    <div id="m-msg-count" class="char-count">0/300</div>
    <button class="submit-btn" onclick="submitMobile()" id="m-submit">投稿する</button>
    <p id="m-status" style="font-size:12px; text-align:center; margin-top:8px; font-weight:bold;"></p>
  </section>
  <section class="log-container">
    <div class="log-header"><span id="m-count">読み込み中...</span><select id="m-sort" onchange="fetchLogs()"><option value="desc">最新順</option><option value="asc">投稿順</option></select></div>
    <div id="m-display"></div>
  </section>
</div>
<footer>&copy; 2026 ゆきだま</footer>

<script>
  const WORKER_URL = 'https://dry-silence-4f1f.y-bb0.workers.dev';
  const nameIn = document.getElementById('m-name');
  const msgIn = document.getElementById('m-message');

  nameIn.oninput = () => {
    const len = nameIn.value.split('#')[0].length;
    document.getElementById('m-name-count').innerText = `${len}/20`;
  };
  msgIn.oninput = () => { document.getElementById('m-msg-count').innerText = `${msgIn.value.length}/300`; };

  function fetchLogs() {
    const display = document.getElementById('m-display');
    const sort = document.getElementById('m-sort').value;
    display.innerHTML = `<div class="status-msg"><img src="bbs_parts/loading.gif" style="height:1.2em; vertical-align:middle; margin-right:8px;">読み込み中...</div>`;
    
    fetch(WORKER_URL)
      .then(res => res.json())
      .then(posts => {
        document.getElementById('m-count').textContent = posts.length + "件の投稿";
        if (sort === 'asc') posts.reverse();
        display.innerHTML = '';
        posts.forEach(p => {
          const icon = p.isAdmin ? '<img src="images/ykadmbbsicon.png" class="admin-icon">' : '';
          const div = document.createElement('div');
          div.className = 'post'; div.id = 'p' + p.no;
          div.innerHTML = `
            <div class="post-info">
              <span>No.${p.no} <span class="post-name">${escapeH(p.name)}</span>${icon}</span>
              <span class="reply-btn" onclick="setReply(${p.no})">返信</span>
            </div>
            <div class="post-content">${processM(p.message)}</div>
            <div style="font-size:10px; color:#999; margin-top:5px; text-align:right;">[${p.date}]</div>
          `;
          display.appendChild(div);
        });
      });
  }

  function processM(t) {
    let h = escapeH(t);
    h = h.replace(/(https?:\/\/[\w?=&.\/-;#~%-]+)/g, url => `<a href="jump.html?url=${encodeURIComponent(url)}" target="_blank">${url}</a>`);
    h = h.replace(/(?:&gt;&gt;|>>)(\d+)/g, (m, p1) => `<span style="color:blue; font-weight:bold;" onclick="jumpTo(${p1})">>>${p1}</span>`);
    return h;
  }

  function escapeH(s) { return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  function setReply(n) {
    msgIn.value = ">>" + n + "\n" + msgIn.value;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    msgIn.focus();
  }

  function jumpTo(n) {
    const el = document.getElementById('p' + n);
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.style.backgroundColor = '#fff9c4'; setTimeout(() => el.style.backgroundColor = 'transparent', 2000); }
  }

  async function submitMobile() {
    const btn = document.getElementById('m-submit');
    const status = document.getElementById('m-status');
    const name = nameIn.value.trim();
    const message = msgIn.value.trim();
    if (!message) return alert("内容を入力してください");
    btn.disabled = true; status.innerText = "送信中...";
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, message })
      });
      if (res.ok) {
        status.style.color = "green"; status.innerText = "投稿完了！";
        msgIn.value = "";
        setTimeout(() => { status.innerText = ""; fetchLogs(); }, 1500);
      } else {
        const d = await res.json(); alert(d.error);
      }
    } catch (e) { alert("エラーが発生しました"); } finally { btn.disabled = false; }
  }
  fetchLogs();
</script>
</body>
</html>

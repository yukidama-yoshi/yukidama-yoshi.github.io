<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>掲示板(モバイル版) - ゆきだまのホームページ A館</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
    }

    /* ヘッダー */
    header {
      background: #fff;
      padding: 10px;
      text-align: center;
      border-bottom: 2px solid #ccc;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    header h1 { font-size: 18px; margin: 0; color: #000; }
    .nav { margin-top: 8px; font-size: 13px; }
    .nav a { color: blue; text-decoration: none; margin: 0 10px; font-weight: bold; }

    .container { padding: 12px; }

    /* 投稿フォーム */
    .post-form {
      background: #fff;
      border: 1px solid #999;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .post-form h2 { font-size: 15px; margin: 0 0 12px 0; border-left: 4px solid #333; padding-left: 8px; }
    
    input[type="text"], textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px; /* iOSのズーム防止 */
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #444;
      color: #fff;
      border: none;
      font-weight: bold;
      font-size: 16px;
      border-radius: 4px;
    }

    /* 掲示板ログ */
    .log-container {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    .log-header {
      padding: 10px;
      background: #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      border-bottom: 1px solid #ccc;
    }

    .post {
      padding: 15px;
      border-bottom: 1px solid #eee;
    }
    .post:last-child { border-bottom: none; }

    .post-info {
      font-size: 12px;
      color: #666;
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .post-name { font-weight: bold; color: #000000; font-size: 14px; }
    .admin-label { color: #fff; background: #e91e63; padding: 1px 4px; border-radius: 3px; font-size: 10px; margin-left: 4px; }

    .post-content {
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .reply-btn {
      color: #007bff;
      text-decoration: none;
      font-weight: bold;
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .anchor-link { color: blue; font-weight: bold; text-decoration: underline; }
    footer { text-align: center; padding: 20px; font-size: 11px; color: #999; }
  </style>
</head>
<body>

<header>
  <h1>ゆきだまのホームページ 掲示板</h1>
  <div class="nav">
    <a href="index.html">トップ</a>
    <a href="#" onclick="location.reload(); return false;">更新</a>
  </div>
</header>

<div class="container">
  <section class="post-form">
    <h2>掲示板に書く</h2>
    <input type="text" id="m-name" placeholder="名前 (空欄で名無し)">
    <textarea id="m-message" placeholder="内容を入力してください" rows="4"></textarea>
    <button class="submit-btn" onclick="submitMobile()" id="m-submit">投稿する</button>
    <p id="m-status" style="font-size:12px; text-align:center; margin-top:8px;"></p>
  </section>

  <section class="log-container">
    <div class="log-header">
      <span id="m-count">読み込み中...</span>
      <select id="m-sort" onchange="fetchLogs()">
        <option value="desc">最新順</option>
        <option value="asc">投稿順</option>
      </select>
    </div>
    <div id="m-display"></div>
  </section>
</div>

<footer>&copy; 2026 ゆきだま</footer>

<script>
  // ログ読み込み
  function fetchLogs() {
    const display = document.getElementById('m-display');
    const sort = document.getElementById('m-sort').value;
    
    fetch('bbs_logs.html?t=' + Date.now())
      .then(res => res.text())
      .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html.replace('CONTENTS_START', ''), 'text/html');
        let posts = Array.from(doc.querySelectorAll('.post'));
        
        document.getElementById('m-count').textContent = posts.length + "件の投稿";
        if (sort === 'asc') posts.reverse();

        display.innerHTML = '';
        posts.forEach(p => {
          const no = p.getAttribute('data-no');
          const name = p.querySelector('strong') ? p.querySelector('strong').innerText : "名無しさん";
          const isAdmin = p.querySelector('.admin-icon') ? '<span class="admin-label">管理人</span>' : '';
          const body = p.querySelector('.post-body') ? p.querySelector('.post-body').innerHTML : "";
          
          // アンカー処理
          const processedBody = body.replace(/(?:&gt;&gt;|>>)(\d+)/g, '<span class="anchor-link" onclick="jumpTo($1)">>>$1</span>');

          const div = document.createElement('div');
          div.className = 'post';
          div.id = 'p' + no;
          div.innerHTML = `
            <div class="post-info">
              <span>No.${no} <span class="post-name">${name}</span>${isAdmin}</span>
              <span class="reply-btn" onclick="setReply(${no})">返信</span>
            </div>
            <div class="post-content">${processedBody}</div>
          `;
          display.appendChild(div);
        });
      });
  }

  function setReply(no) {
    const msg = document.getElementById('m-message');
    msg.value = ">>" + no + "\n" + msg.value;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    msg.focus();
  }

  function jumpTo(no) {
    const el = document.getElementById('p' + no);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.backgroundColor = '#fff9c4';
      setTimeout(() => el.style.backgroundColor = 'transparent', 2000);
    }
  }

  async function submitMobile() {
    const btn = document.getElementById('m-submit');
    const status = document.getElementById('m-status');
    const name = document.getElementById('m-name').value.trim() || "名無しさん";
    const message = document.getElementById('m-message').value.trim();

    if (!message) return alert("内容を入力してください");

    btn.disabled = true;
    status.innerText = "送信中...";

    try {
      const res = await fetch('https://dry-silence-4f1f.y-bb0.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, message })
      });

      if (res.ok) {
        status.style.color = "green";
        status.innerText = "投稿完了！";
        document.getElementById('m-message').value = "";
        setTimeout(() => { status.innerText = ""; fetchLogs(); }, 2000);
      } else {
        throw new Error();
      }
    } catch (e) {
      status.style.color = "red";
      status.innerText = "送信失敗しました";
    } finally {
      btn.disabled = false;
    }
  }

  fetchLogs();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゆきだまのホームページ - 入手済みソフト一覧</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    /* プルダウンメニューの配置用スタイル */
    .sort-container {
      margin-bottom: 15px;
    }
    .sort-select {
      padding: 4px 8px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <nav class="sidebar" id="sidebar"></nav>
  
  <div class="resizer" id="resizer"></div>

  <div class="main">
    <h1>ゲームコレクション - 入手済みソフト一覧</h1>
    
    <p>
      [ <a href="hard.html">入手済みハード一覧へ</a> ] ｜ 
      [ <a href="index.html">ゲームコレクショントップへ</a> ]
    </p>

    <hr>

    <div class="sort-container">
      <select id="sort-menu" class="sort-select">
        <option value="default">[並び替え]▼</option>
        <option value="date">[入手日順]</option>
        <option value="kana">[あいうえお順]</option>
      </select>
    </div>

    <div id="soft-container"></div>

    <hr>
    <p><a href="../index.html">トップページへ戻る</a></p>

    <footer>
      <p>© 2026 ゆきだま. All rights reserved.</p>
    </footer>
  </div>

  <script src="../js/load-sidebar.js"></script>

  <script>
    /* サイドバーリサイズ機能（共通） */
    const resizer = document.getElementById('resizer');
    const sidebarEl = document.getElementById('sidebar');
    let isResizing = false;

    resizer.addEventListener('mousedown', () => { 
      isResizing = true; 
      document.body.style.cursor = 'ew-resize'; 
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      if (e.clientX > 100 && e.clientX < 600) {
        sidebarEl.style.width = e.clientX + 'px';
      }
    });

    document.addEventListener('mouseup', () => { 
      isResizing = false; 
      document.body.style.cursor = 'default'; 
    });

    // ハードごとにグループ分けした元のデータを保存するオブジェクト
    let originalGroups = {};

    /* softwares.csv の読み込み処理 */
    fetch('softwares.csv')
      .then(response => {
        if (!response.ok) throw new Error('CSVの読み込みに失敗しました');
        return response.text();
      })
      .then(text => {
        const lines = text.trim().split('\n');
        
        for (let i = 1; i < lines.length; i++) {
          if (!lines[i]) continue;
          
          const cols = lines[i].split(',');
          if (cols.length < 3) continue;

          const hwName = cols[0].trim();
          const title = cols[1].trim();
          const date = cols[2].trim();

          // ハード名ごとに配列を作ってデータをストックする
          if (!originalGroups[hwName]) {
            originalGroups[hwName] = [];
          }
          originalGroups[hwName].push({ title, date });
        }

        // 初期表示（元のCSV順）
        renderAllTables(originalGroups);
        // プルダウンのイベントを設定
        setupSortEvent();
      })
      .catch(error => {
        console.error(error);
        document.getElementById('soft-container').innerHTML = '<p>データの読み込みに失敗しました。</p>';
      });

    /* すべてのハードの表を描画する関数 */
    function renderAllTables(groupsData) {
      const container = document.getElementById('soft-container');
      container.innerHTML = ''; // 一度全体をクリア

      for (const hwName in groupsData) {
        // 各ハードの見出し（▼機種名）
        const h3 = document.createElement('h3');
        h3.textContent = `▼${hwName}`;
        h3.style.marginTop = '30px';
        container.appendChild(h3);

        // テーブルの作成
        const table = document.createElement('table');
        table.setAttribute('border', '1');
        table.setAttribute('cellspacing', '0');
        table.setAttribute('cellpadding', '5');
        table.style.borderCollapse = 'collapse';
        table.style.width = '100%';
        table.style.fontSize = '14px';
        table.style.marginBottom = '20px';

        table.innerHTML = `
          <thead>
            <tr style="background-color: #e0e0e0; text-align: left;">
              <th>タイトル</th>
              <th style="width: 25%;">入手日</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;

        const tbody = table.querySelector('tbody');
        
        // ストックされているソフト一覧を1行ずつ追加
        groupsData[hwName].forEach(soft => {
          const tr = document.createElement('tr');
          
          const tdTitle = document.createElement('td');
          tdTitle.textContent = soft.title;
          tr.appendChild(tdTitle);
          
          const tdDate = document.createElement('td');
          tdDate.textContent = soft.date;
          tr.appendChild(tdDate);

          tbody.appendChild(tr);
        });

        container.appendChild(table);
      }
    }

    /* プルダウン切り替え時のソート処理 */
    function setupSortEvent() {
      const sortMenu = document.getElementById('sort-menu');

      sortMenu.addEventListener('change', (e) => {
        const selectedValue = e.target.value;

        if (selectedValue === 'default') {
          // [並び替え] の場合は元のデータ構造のまま再描画
          renderAllTables(originalGroups);
          return;
        }

        // 元のデータを壊さないように、新しくソート済みのオブジェクトを作る
        let sortedGroups = {};

        for (const hwName in originalGroups) {
          // 各ハードごとのソフト配列をコピーしてソート
          let softs = [...originalGroups[hwName]];

          softs.sort((a, b) => {
            // 「不明」データはどちらのソートでも常に一番下に送る
            if (a.date === '不明' && b.date !== '不明') return 1;
            if (a.date !== '不明' && b.date === '不明') return -1;
            if (a.date === '不明' && b.date === '不明') return 0;

            if (selectedValue === 'date') {
              // 入手日順（古い順）
              return a.date.localeCompare(b.date, 'ja');
            } else if (selectedValue === 'kana') {
              // タイトルのあいうえお順
              return a.title.localeCompare(b.title, 'ja');
            }
            return 0;
          });

          sortedGroups[hwName] = softs;
        }

        // ソートが完了したデータを画面に反映
        renderAllTables(sortedGroups);
      });
    }
  </script>
</body>
</html>

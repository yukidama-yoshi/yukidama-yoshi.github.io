<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゆきだまのホームページ - 入手済みソフト一覧</title>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>

  <nav class="sidebar" id="sidebar"></nav>
  
  <div class="resizer" id="resizer"></div>

  <div class="main">
    <h1>ゲームコレクション - 入手済みソフト一覧</h1>
    
    <p>
      [ <a href="hard.html">入手済みハード一覧へ</a> ] ｜ 
      [ <a href="index.html">ゲームコレクション部屋トップへ</a> ]
    </p>

    <hr>

    <div id="soft-container"></div>

    <hr>
    <p><a href="../index.html">トップページへ戻る</a></p>

    <footer>
      <p>© 2026 ゆきだま. All rights reserved.</p>
    </footer>
  </div>

  <script src="../js/load-sidebar.js"></script>

  <script>
    /* サイドバーリサイズ機能（共通） */
    const resizer = document.getElementById('resizer');
    const sidebarEl = document.getElementById('sidebar');
    let isResizing = false;

    resizer.addEventListener('mousedown', () => { 
      isResizing = true; 
      document.body.style.cursor = 'ew-resize'; 
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      if (e.clientX > 100 && e.clientX < 600) {
        sidebarEl.style.width = e.clientX + 'px';
      }
    });

    document.addEventListener('mouseup', () => { 
      isResizing = false; 
      document.body.style.cursor = 'default'; 
    });

    /* softwares.csv を読み込んでハードごとに仕分ける処理 */
    fetch('softwares.csv')
      .then(response => {
        if (!response.ok) throw new Error('CSVの読み込みに失敗しました');
        return response.text();
      })
      .then(text => {
        const lines = text.trim().split('\n');
        const container = document.getElementById('soft-container');
        
        const hardwareGroups = {};

        for (let i = 1; i < lines.length; i++) {
          if (!lines[i]) continue;
          
          const cols = lines[i].split(',');
          if (cols.length < 3) continue;

          const hwName = cols[0].trim();
          const title = cols[1].trim();
          const date = cols[2].trim();

          if (!hardwareGroups[hwName]) {
            hardwareGroups[hwName] = [];
          }
          hardwareGroups[hwName].push({ title, date });
        }

        for (const hwName in hardwareGroups) {
          const h3 = document.createElement('h3');
          h3.textContent = `▼${hwName}`;
          h3.style.marginTop = '30px';
          container.appendChild(h3);

          const table = document.createElement('table');
          table.className = 'soft-table';
          table.setAttribute('border', '1');
          table.setAttribute('cellspacing', '0');
          table.setAttribute('cellpadding', '5');
          table.style.borderCollapse = 'collapse';
          table.style.width = '100%';
          table.style.fontSize = '14px';
          table.style.marginBottom = '20px';

          table.innerHTML = `
            <thead>
              <tr style="background-color: #e0e0e0; text-align: left;">
                <th style="cursor: pointer;">タイトル ▲▼</th>
                <th style="width: 25%; cursor: pointer;">入手日 ▲▼</th>
              </tr>
            </thead>
            <tbody></tbody>
          `;

          const tbody = table.querySelector('tbody');

          hardwareGroups[hwName].forEach(soft => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${soft.title}</td>
              <td>${soft.date}</td>
            `;
            tbody.appendChild(tr);
          });

          container.appendChild(table);
          setupTableSort(table);
        }
      })
      .catch(error => {
        console.error(error);
        document.getElementById('soft-container').innerHTML = '<p>データの読み込みに失敗しました。</p>';
      });

    function setupTableSort(table) {
      table.querySelectorAll('th').forEach((th, colIdx) => {
        let asc = true;
        th.addEventListener('click', () => {
          const tbody = table.querySelector('tbody');
          const rows = Array.from(tbody.querySelectorAll('tr'));
          
          rows.sort((rowA, rowB) => {
            const cellA = rowA.children[colIdx].textContent.trim();
            const cellB = rowB.children[colIdx].textContent.trim();
            return asc ? cellA.localeCompare(cellB, 'ja') : cellB.localeCompare(cellA, 'ja');
          });
          
          rows.forEach(row => tbody.appendChild(row));
          asc = !asc;
        });
      });
    }
  </script>
</body>
</html>

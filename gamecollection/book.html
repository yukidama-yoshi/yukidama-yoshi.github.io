<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゆきだまのホームページ - 入手済み攻略本・関連グッズ一覧</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    /* プルダウンメニューの配置用スタイル */
    .sort-container {
      margin-bottom: 15px;
    }
    .sort-select {
      padding: 4px 8px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <nav class="sidebar" id="sidebar"></nav>
  
  <div class="resizer" id="resizer"></div>

  <div class="main">
    <h1>ゲームコレクション - 入手済み攻略本・関連グッズ一覧</h1>
    
    <p>
      [ <a href="soft.html">入手済みソフト一覧へ</a> ] ｜ 
      [ <a href="hard.html">入手済みハード一覧へ</a> ] ｜ 
      [ <a href="index.html">ゲームコレクショントップへ</a> ]
    </p>

    <hr>

    <div class="sort-container">
      <select id="sort-menu" class="sort-select">
        <option value="default">[並び替え]</option>
        <option value="date">[入手日順]</option>
      </select>
    </div>

    <div id="book-container"></div>

    <hr>
    <p><a href="../index.html">トップページへ戻る</a></p>

    <footer>
      <p>© 2026 ゆきだま. All rights reserved.</p>
    </footer>
  </div>

  <script src="../js/load-sidebar.js"></script>

  <script>
    /* サイドバーリサイズ機能（共通） */
    const resizer = document.getElementById('resizer');
    const sidebarEl = document.getElementById('sidebar');
    let isResizing = false;

    resizer.addEventListener('mousedown', () => { 
      isResizing = true; 
      document.body.style.cursor = 'ew-resize'; 
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      if (e.clientX > 100 && e.clientX < 600) {
        sidebarEl.style.width = e.clientX + 'px';
      }
    });

    document.addEventListener('mouseup', () => { 
      isResizing = false; 
      document.body.style.cursor = 'default'; 
    });

    // カテゴリごとにグループ分けした元のデータを保存するオブジェクト
    let originalGroups = {};

    /* books.csv の読み込み処理 */
    fetch('books.csv')
      .then(response => {
        if (!response.ok) throw new Error('CSVの読み込みに失敗しました');
        return response.text();
      })
      .then(text => {
        const lines = text.trim().split('\n');
        
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue; // 空行は飛ばす
          
          const cols = line.split(',');
          if (cols.length < 4) continue; // 列数が足りない場合はスキップ

          const category = cols[0].trim();
          const title = cols[1].trim();
          const publisher = cols[2].trim();
          const date = cols[3].trim();
          const isbn = cols[4] ? cols[4].trim() : '';

          // 英語表記のヘッダー行を確実にスキップする
          if (category.toLowerCase() === 'category' || title.toLowerCase() === 'title') {
            continue;
          }

          // カテゴリ名ごとに配列を作ってデータをストックする
          if (!originalGroups[category]) {
            originalGroups[category] = [];
          }
          originalGroups[category].push({ title, publisher, date, isbn });
        }

        // 初期表示
        renderAllTables(originalGroups);
        // プルダウンのイベントを設定
        setupSortEvent();
      })
      .catch(error => {
        console.error(error);
        document.getElementById('book-container').innerHTML = '<p>データの読み込みに失敗しました。</p>';
      });

    /* すべてのカテゴリの表を描画する関数 */
    function renderAllTables(groupsData) {
      const container = document.getElementById('book-container');
      container.innerHTML = ''; // 一度全体をクリア

      for (const category in groupsData) {
        // 各カテゴリの見出し（▼カテゴリ名）
        const h3 = document.createElement('h3');
        h3.textContent = `▼${category}`;
        h3.style.marginTop = '30px';
        container.appendChild(h3);

        // テーブルの作成
        const table = document.createElement('table');
        table.setAttribute('border', '1');
        table.setAttribute('cellspacing', '0');
        table.setAttribute('cellpadding', '5');
        table.style.borderCollapse = 'collapse';
        table.style.width = '100%';
        table.style.fontSize = '14px';
        table.style.marginBottom = '20px';

        table.innerHTML = `
          <thead>
            <tr style="background-color: #e0e0e0; text-align: left;">
              <th>タイトル</th>
              <th>出版社 / メーカー</th>
              <th style="width: 20%;">入手日</th>
              <th style="width: 20%;">ISBN</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;

        const tbody = table.querySelector('tbody');
        
        // ストックされている本・グッズ一覧を1行ずつ追加
        groupsData[category].forEach(item => {
          const tr = document.createElement('tr');
          
          const tdTitle = document.createElement('td');
          tdTitle.textContent = item.title;
          tr.appendChild(tdTitle);

          const tdPublisher = document.createElement('td');
          tdPublisher.textContent = item.publisher;
          tr.appendChild(tdPublisher);
          
          const tdDate = document.createElement('td');
          tdDate.textContent = item.date;
          tr.appendChild(tdDate);

          const tdIsbn = document.createElement('td');
          tdIsbn.textContent = item.isbn;
          tr.appendChild(tdIsbn);

          tbody.appendChild(tr);
        });

        container.appendChild(table);
      }
    }

    /* プルダウン切り替え時のソート処理 */
    function setupSortEvent() {
      const sortMenu = document.getElementById('sort-menu');

      sortMenu.addEventListener('change', (e) => {
        const selectedValue = e.target.value;

        if (selectedValue === 'default') {
          renderAllTables(originalGroups);
          return;
        }

        let sortedGroups = {};

        for (const category in originalGroups) {
          let items = [...originalGroups[category]];

          items.sort((a, b) => {
            if (a.date === '不明' && b.date !== '不明') return 1;
            if (a.date !== '不明' && b.date === '不明') return -1;
            if (a.date === '不明' && b.date === '不明') return 0;

            if (selectedValue === 'date') {
              return a.date.localeCompare(b.date, 'ja');
            }
            return 0;
          });

          sortedGroups[category] = items;
        }

        renderAllTables(sortedGroups);
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理パネル</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "MS Gothic", "Osaka", monospace;
      background-image: url("images/pg.png");
      background-repeat: repeat;
      background-size: 600px;
      color: #000;
      min-height: 100vh;
    }

    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      background-color: rgba(255, 255, 255, 0.65);
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      font-size: 1.3rem;
      margin-bottom: 6px;
    }

    hr {
      width: 80%;
      margin: 16px auto 24px;
      border: none;
      border-top: 1px solid #999;
    }

    /* ログイン */
    #login-screen {
      display: flex;
      justify-content: center;
      padding-top: 80px;
    }

    #login-box {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid #999;
      border-radius: 4px;
      padding: 30px;
      width: 320px;
      text-align: center;
    }

    #login-box h2 {
      font-size: 1rem;
      margin-bottom: 16px;
    }

    #login-box input {
      width: 100%;
      padding: 6px;
      margin-bottom: 10px;
      border: 1px solid #999;
      font-family: inherit;
      font-size: 13px;
    }

    #login-box button {
      width: 100%;
      padding: 8px;
      background: #eee;
      border: 1px solid #999;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      font-weight: bold;
    }

    #login-box button:hover { background: #ddd; }
    #login-error { color: red; font-size: 12px; margin-top: 8px; }

    /* 管理画面ヘッダー */
    #admin-screen { display: none; }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .admin-header h2 { font-size: 1rem; }

    .header-btns { display: flex; gap: 8px; }

    .btn-small {
      padding: 4px 10px;
      background: #eee;
      border: 1px solid #999;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    .btn-small:hover { background: #ddd; }

    /* 投稿一覧 */
    #posts-container {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid #999;
      border-radius: 4px;
      padding: 20px;
      min-height: 200px;
    }

    .post-card {
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px dotted #999;
    }

    .post-card:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .post-meta {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .post-name { font-weight: bold; color: #000; }

    .post-message {
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 4px 0 8px;
    }

    /* 操作ボタン */
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .btn-action {
      padding: 3px 10px;
      border: 1px solid #999;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      background: #eee;
    }

    .btn-action:hover { background: #ddd; }
    .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-delete  { border-color: #c00; color: #c00; }
    .btn-ban1w   { border-color: #c60; color: #c60; }
    .btn-banperm { border-color: #900; color: #900; }
    .btn-unban   { border-color: #00c; color: #00c; }

    .btn-delete:hover  { background: #fee; }
    .btn-ban1w:hover   { background: #fef0e0; }
    .btn-banperm:hover { background: #fee; }
    .btn-unban:hover   { background: #eef; }

    /* ステータスバー */
    #status-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 6px 20px;
      font-family: "MS Gothic", "Osaka", monospace;
      font-size: 13px;
      border: 1px solid #666;
      display: none;
      white-space: nowrap;
    }

    .status-msg { text-align: center; padding: 20px; font-size: 13px; color: #666; }

    footer {
      margin-top: 40px;
      font-size: 12px;
      text-align: center;
      color: #666;
    }
  </style>
</head>
<body>
<div class="main">

  <h1>管理パネル</h1>
  <hr>

  <!-- ログイン画面 -->
  <div id="login-screen">
    <div id="login-box">
      <h2>管理者ログイン</h2>
      <input type="password" id="key-input" placeholder="管理者キーを入力">
      <button onclick="login()">ログイン</button>
      <div id="login-error"></div>
    </div>
  </div>

  <!-- 管理画面 -->
  <div id="admin-screen">
    <div class="admin-header">
      <h2>投稿一覧 <span id="post-count" style="font-weight:normal; font-size:0.9em;">(0件)</span></h2>
      <div class="header-btns">
        <button class="btn-small" onclick="loadPosts()">🔄 更新</button>
        <button class="btn-small" onclick="logout()">ログアウト</button>
      </div>
    </div>

    <div id="posts-container">
      <div class="status-msg">読み込み中...</div>
    </div>
  </div>

  <footer><p>© 2026 ゆきだま</p></footer>
</div>

<div id="status-bar"></div>

<script>
  // ==========================================
  // 【設定】WorkerのURLを入力してください
  // ==========================================
  const WORKER_URL = "https://dry-silence-4f1f.y-bb0.workers.dev";

  let adminKey = "";

  // --- ログイン ---
  function login() {
    const input = document.getElementById("key-input").value.trim();
    if (!input) return;
    adminKey = input;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("admin-screen").style.display = "block";
    loadPosts();
  }

  document.getElementById("key-input").addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });

  // --- ログアウト ---
  function logout() {
    adminKey = "";
    document.getElementById("admin-screen").style.display = "none";
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("key-input").value = "";
    document.getElementById("login-error").textContent = "";
  }

  // --- 投稿一覧の読み込み ---
  async function loadPosts() {
    const container = document.getElementById("posts-container");
    container.innerHTML = '<div class="status-msg">読み込み中...</div>';

    try {
      const res = await fetch(WORKER_URL, {
        headers: { "X-Admin-Key": adminKey }
      });
      const posts = await res.json();

      if (!Array.isArray(posts)) {
        // 認証失敗の場合はログイン画面に戻す
        if (res.status === 401) {
          document.getElementById("login-error").textContent = "管理者キーが違います";
          logout();
          return;
        }
        container.innerHTML = `<div class="status-msg" style="color:red">${escHtml(posts.error || "取得失敗")}</div>`;
        return;
      }

      document.getElementById("post-count").textContent = `(${posts.length}件)`;

      if (posts.length === 0) {
        container.innerHTML = '<div class="status-msg">書き込みがありません。</div>';
        return;
      }

      container.innerHTML = posts.map(p => `
        <div class="post-card" id="card-${p.no}">
          <div class="post-meta">
            No.${p.no} &nbsp;
            <span class="post-name">${escHtml(p.name)}</span>
            ${p.isAdmin ? "【管理者】" : ""}
            &nbsp; [${escHtml(p.date)}]
          </div>
          <div class="post-message">${escHtml(p.message)}</div>
          <div class="actions">
            <button class="btn-action btn-delete"  onclick="doDelete(${p.no})">削除</button>
            <button class="btn-action btn-ban1w"   onclick="doBan(${p.no}, false)">1週間BAN</button>
            <button class="btn-action btn-banperm" onclick="doBan(${p.no}, true)">永続BAN</button>
            <button class="btn-action btn-unban"   onclick="doUnban(${p.no})">BAN解除</button>
          </div>
        </div>
      `).join("");

    } catch (e) {
      container.innerHTML = `<div class="status-msg" style="color:red">通信エラー: ${escHtml(e.message)}</div>`;
    }
  }

  // --- 削除 ---
  async function doDelete(no) {
    if (!confirm(`No.${no} を削除しますか？`)) return;
    const res = await adminPost("/admin/delete", { no });
    if (res.success) {
      document.getElementById(`card-${no}`)?.remove();
      updateCount(-1);
      showStatus(res.info);
    } else {
      showStatus(res.error || "エラーが発生しました", true);
    }
  }

  // --- BAN ---
  async function doBan(no, permanent) {
    const label = permanent ? "永続BAN" : "1週間BAN";
    if (!confirm(`No.${no} を${label}しますか？`)) return;
    const res = await adminPost("/admin/ban", { no, permanent });
    showStatus(res.success ? res.info : (res.error || "エラーが発生しました"), !res.success);
  }

  // --- BAN解除 ---
  async function doUnban(no) {
    if (!confirm(`No.${no} のBANを解除しますか？`)) return;
    const res = await adminPost("/admin/unban", { no });
    showStatus(res.success ? res.info : (res.error || "エラーが発生しました"), !res.success);
  }

  // --- 管理APIへのPOST共通処理 ---
  async function adminPost(path, body) {
    try {
      const res = await fetch(WORKER_URL + path, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Admin-Key": adminKey
        },
        body: JSON.stringify(body)
      });
      return await res.json();
    } catch (e) {
      return { error: "通信エラー: " + e.message };
    }
  }

  // --- 件数更新 ---
  function updateCount(delta) {
    const el = document.getElementById("post-count");
    const current = parseInt(el.textContent.replace(/\D/g, "")) || 0;
    el.textContent = `(${Math.max(0, current + delta)}件)`;
  }

  // --- ステータスバー ---
  function showStatus(msg, isError = false) {
    const bar = document.getElementById("status-bar");
    bar.textContent = msg;
    bar.style.background = isError ? "#c00" : "#333";
    bar.style.display = "block";
    setTimeout(() => bar.style.display = "none", 3000);
  }

  // --- HTMLエスケープ ---
  function escHtml(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
</script>
</body>
</html>

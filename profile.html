<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>プロフィール - ゆきだまのホームページ</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* プロフィールページ専用の背景画像と文字色の調整 */
    body {
      background-image: url("images/Profile.png") !important;
      background-size: 300px !important;
      color: #333333 !important;
    }

    /* プロフィールページのレイアウト（読みやすい左寄せ） */
    .profile-container {
      max-width: 800px;
      margin: 0;
    }

    .profile-details {
      margin-top: 20px;
    }

    .profile-details dt {
      font-weight: bold;
      font-size: 18px;
      color: blue;
      margin-top: 15px;
      border-left: 4px solid blue;
      padding-left: 8px;
    }

    .profile-details dd {
      margin: 5px 0 15px 12px;
      font-size: 16px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <nav class="sidebar" id="sidebar"></nav>

  <div class="resizer" id="resizer"></div>

  <div class="main">
    <div class="profile-container">
      <h1>プロフィール</h1>
      
      <div class="profile-details">
        <dl>
          <dt>名前</dt>
          <dd>ゆきだま</dd>

          <dt>自己紹介</dt>
          <dd>ゆきだまと申します。日々レトロゲームに奮闘しています。<br>最近はスーファミやファミコン、Wiiなどで遊んでます。ツイッターも見てね。</dd>

        </dl>
      </div>

      <footer>
        <p>© 2026 yukidama-yoshi. All rights reserved.</p>
      </footer>
    </div>
  </div>

  <script src="js/load-sidebar.js"></script>

  <script>
    const resizer = document.getElementById('resizer');
    const sidebar = document.getElementById('sidebar');
    let isResizing = false;

    resizer.addEventListener('mousedown', function () {
      isResizing = true;
      document.body.style.cursor = 'ew-resize';
      document.body.style.userSelect = 'none'; 
    });

    document.addEventListener('mousemove', function (e) {
      if (!isResizing) return;
      const newWidth = e.clientX;
      if (newWidth > 100 && newWidth < 600) {
        sidebar.style.width = newWidth + 'px';
      }
    });

    document.addEventListener('mouseup', function () {
      isResizing = false;
      document.body.style.cursor = 'default';
      document.body.style.userSelect = 'auto';
    });
  </script>
</body>
</html>

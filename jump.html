<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>移動確認 - ゆきだまのホームページ</title>
  <style>
    body { 
      font-family: "MS Gothic", "Osaka", monospace; 
      background: #eee; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
    }
    .container { background: white; padding: 30px; border: 2px solid #333; box-shadow: 5px 5px 0px #999; max-width: 500px; width: 90%; text-align: center; }
    h2 { font-size: 18px; color: #d00; border-bottom: 2px solid #d00; padding-bottom: 10px; }
    #status-text { font-size: 15px; margin: 20px 0; line-height: 1.6; }
    .url-display { background: #f9f9f9; border: 1px inset #ccc; padding: 15px; margin: 20px 0; word-break: break-all; font-size: 14px; color: #555; }
    .btns { display: flex; gap: 10px; justify-content: center; }
    .btn { text-decoration: none; padding: 10px 20px; border: 1px solid #333; color: #000; font-weight: bold; background: #fff; cursor: pointer; }
    .btn:hover { background: #eee; }
    .btn-go { background: #007bff; color: white; border-color: #0056b3; }
    .btn-go:hover { background: #0056b3; }
    .notice { font-size: 11px; color: #666; margin-top: 20px; text-align: left; }
    
    /* オリジナルGIF用スタイル */
    #loading-gif { display: none; margin: 15px auto; width: 32px; height: 32px; vertical-align: middle; }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="title-text">確認</h2>
    <p id="status-text">URLを確認しています...</p>
    
    <img id="loading-gif" src="bbs_parts/loading.gif" alt="読み込み中">
    
    <div id="url-box" class="url-display" style="display:none;"></div>

    <div id="btn-area" class="btns" style="display:none;">
      <a href="javascript:history.back()" class="btn">戻る</a>
      <a id="jump-link" href="" class="btn btn-go">サイトへ移動する</a>
    </div>

    <div id="notice-area" class="notice" style="display:none;">
      ※移動先のサイトで発生したトラブル等について、当サイトは一切の責任を負いません。
    </div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const urlString = params.get('url');
      const statusText = document.getElementById('status-text');
      const loadingGif = document.getElementById('loading-gif');

      if (!urlString) {
        statusText.innerText = "エラー：URLが見つかりません。";
        return;
      }

      try {
        const targetUrl = new URL(urlString, window.location.href);
        const currentHost = window.location.hostname;

        // 【判定】ドメインが同じ、または相対パスの場合
        if (targetUrl.hostname === currentHost || !targetUrl.hostname) {
          document.getElementById('title-text').innerText = "自動転送";
          statusText.innerHTML = "サイト内リンクのため、<br>自動的にリダイレクトします...";
          loadingGif.style.display = "block";

          // 0.8秒待機してリダイレクト
          setTimeout(() => {
            window.location.replace(urlString);
          }, 800);

        } else {
          // 外部ドメインの場合
          statusText.innerHTML = "掲示板に投稿されたリンクをクリックしました。<br>これより先は外部のサイトへ移動します。";
          document.getElementById('url-box').innerText = urlString;
          document.getElementById('url-box').style.display = "block";
          document.getElementById('btn-area').style.display = "flex";
          document.getElementById('notice-area').style.display = "block";
          document.getElementById('jump-link').href = urlString;
        }
      } catch (e) {
        statusText.innerText = "エラー：無効なURL形式です。";
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>リンク - ゆきだまのホームページ</title>
  
  <link rel="stylesheet" href="css/common.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "MS Gothic", "Osaka", monospace;
      background-image: url("images/pg.png");
      background-repeat: repeat;
      background-size: 600px;
      color: #000000;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .resizer {
      width: 5px;
      cursor: ew-resize;
      background-color: #ccc;
      flex-shrink: 0;
    }

    .main {
      flex: 1;
      padding: 40px 40px; /* 余白を少し広めに */
      overflow-y: auto;
      background-color: rgba(255, 255, 255, 0.65);
      /* 【変更】中央揃えをやめて左揃えに */
      text-align: left; 
    }

    h1 {
      font-size: 24px; /* 少しサイズ調整 */
      margin-bottom: 20px;
      border-bottom: 1px solid #ccc; /* 見出しっぽく下線 */
      padding-bottom: 5px;
    }

    ul {
      list-style: none !important;
      padding: 0;
      margin: 0 0 30px 0; /* 下に余裕を持たせる */
      max-width: 800px;
    }

    li {
      margin-bottom: 15px;
      font-size: 16px;
    }

    /* リンクの左側に少し余白を */
    a.link {
      color: blue;
      text-decoration: none;
      font-weight: bold;
    }
    a.link:hover {
      text-decoration: underline;
    }

    .friend-code {
      margin-top: 30px;
      font-size: 16px;
      background: rgba(255,255,255,0.4);
      padding: 15px;
      border-radius: 5px;
      display: inline-block; /* 中身の幅に合わせる */
    }

    footer {
      margin-top: 60px;
      font-size: 12px;
      text-align: center; /* フッターだけは真ん中でもいいかも */
    }
  </style>
</head>
<body>

  <nav class="sidebar" id="sidebar"></nav>

  <div class="resizer" id="resizer"></div>

  <div class="main">
    <h1>リンク集</h1>
    <ul>
      <li><a class="link" href="https://yukidama-yoshi.doorblog.jp/" target="_blank">Livedoorブログ</a></li>
      <li><a class="link" href="https://scratch.mit.edu/users/yukidama_/" target="_blank">Scratch</a></li>
      <li><a class="link" href="https://note.com/yukidama_yoshi" target="_blank">note</a></li>
      <li><a class="link" href="https://www.youtube.com/@yukidama-yoshi" target="_blank">Youtube</a></li>
      <li><a class="link" href="https://x.com/yukidama_yoshi/" target="_blank">Twitter</a></li>
    </ul>

    <h1>ホームページ B館（β）</h1>
    <p>GoogleSitesを使用しておりますので、とてもきれいなページとなっています。</p>
    <ul>
      <li><a class="link" href="https://sites.google.com/view/yukidama-yoshi/" target="_blank">ホームページ B館</a></li>
    </ul>
    
    <div class="friend-code">
      <p style="margin:0;">ニンテンドースイッチ フレンドコード：</p>
      <p style="margin:5px 0 0 0;"><strong>SW-0946-6035-5410</strong></p>
    </div>

    <footer>
      <p>© 2026 yukidama-yoshi. All rights reserved.</p>
    </footer>
  </div>

  <script src="js/load-sidebar.js"></script>

  <script>
    /* サイドバーリサイズ（indexと共通） */
    const resizer = document.getElementById('resizer');
    const sidebar = document.getElementById('sidebar');
    let isResizing = false;

    resizer.addEventListener('mousedown', function () {
      isResizing = true;
      document.body.style.cursor = 'ew-resize';
      document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', function (e) {
      if (!isResizing) return;
      const newWidth = e.clientX;
      if (newWidth > 100 && newWidth < 600) {
        sidebar.style.width = newWidth + 'px';
      }
    });

    document.addEventListener('mouseup', function () {
      isResizing = false;
      document.body.style.cursor = 'default';
      document.body.style.userSelect = 'auto';
    });
  </script>
</body>
</html>

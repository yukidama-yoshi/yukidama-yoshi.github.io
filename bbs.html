<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>掲示板 - ゆきだまのホームページ A館</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "MS Gothic", "Osaka", monospace;
      background-image: url("images/pg.png");
      background-repeat: repeat;
      background-size: 600px;
      color: #000000;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 200px;
      min-width: 100px;
      background-color: #ffffff;
      border-right: 1px solid #ccc;
      padding: 20px;
      font-size: 14px;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      padding: 6px 0;
      color: blue;
      text-decoration: none;
      font-weight: bold;
    }

    .sidebar a::before {
      content: "";
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #999;
      margin-right: 8px;
    }

    .resizer {
      width: 5px;
      cursor: ew-resize;
      background-color: #ccc;
    }

    .main {
      flex: 1;
      padding: 40px 20px;
      overflow-y: auto;
      background-color: rgba(255, 255, 255, 0.65);
    }

    .bbs-container {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      max-width: 1200px;
      margin: 0 auto;
    }

    #bbs-log {
      flex: 1;
      background: rgba(255, 255, 255, 0.8);
      padding: 20px;
      border: 1px solid #999;
      border-radius: 4px;
      min-height: 800px;
    }

    .form-wrapper {
      width: 450px;
      position: sticky;
      top: 0;
    }

    .post {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px dotted #999;
      transition: background-color 0.5s;
    }

    .post-body {
      display: block;
      margin-top: 8px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .admin-icon {
      width: 18px;
      height: 18px;
      vertical-align: middle;
      margin-left: 5px;
      border: 1px solid #ccc;
    }

    .anchor-link {
      color: blue;
      text-decoration: underline;
      cursor: pointer;
      font-weight: bold;
    }
    .anchor-link:hover {
      color: red;
      background-color: #ffff00;
    }

    h1, h2, h3 { text-align: center; }
    footer { margin-top: 40px; font-size: 12px; text-align: center; }

    .refresh-btn {
      cursor: pointer;
      padding: 4px 10px;
      font-family: "MS Gothic", "Osaka", monospace;
      font-size: 12px;
      background: #eee;
      border: 1px solid #999;
    }
    .refresh-btn:hover { background: #ddd; }

    .char-count {
      text-align: right;
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }
    .char-over {
      color: red;
      font-weight: bold;
    }

    .status-msg {
      text-align: center;
      padding: 20px;
      font-size: 14px;
    }

.post-header {
      display: flex;
      justify-content: flex-end; 
      font-size: 12px;
      height: 0; 
      position: relative;
      top: 0;
    }
    .post-no {
      color: #666;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.7); 
      padding: 2px 5px;
    }
    .reply-btn {
      color: blue;
      text-decoration: underline;
      cursor: pointer;
      margin-left: 10px;
    }
    .reply-btn:hover {
      color: red;
    }
    
  </style>
</head>
<body>

  <nav class="sidebar" id="sidebar"></nav>
  <div class="resizer" id="resizer"></div>

  <div class="main">
    <h1>掲示板</h1>
    <hr style="width: 80%; margin: 20px auto;">

    <div class="bbs-container">
      <section id="bbs-log">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #ccc; padding-bottom: 5px;">
          <h3 style="margin: 0;">書き込み <span id="post-count" style="font-weight: normal; font-size: 0.9em;">(0件)</span></h3>
          <button type="button" class="refresh-btn" onclick="loadBBSLogs()">最新の情報に更新</button>
        </div>
        <div id="bbs-display-area"></div>
      </section>

      <section class="form-wrapper">
        <div style="background: rgba(255, 255, 255, 0.8); padding: 20px; border: 1px solid #999; border-radius: 4px;">
          <h3 style="margin-top:0;">新規投稿</h3>
          <p>名前：<br>
            <input type="text" id="post-name" placeholder="名無しさん" style="width: 100%; box-sizing: border-box; padding: 5px;">
            <div id="name-count" class="char-count">0/20</div>
          </p>
          <p>内容：<br>
            <textarea id="post-message" placeholder="メッセージを入力してください" style="width: 100%; height: 200px; box-sizing: border-box; padding: 5px; resize: vertical;"></textarea>
            <div id="message-count" class="char-count">0/300</div>
          </p>
          <button type="button" onclick="submitToCloudflare()" id="submit-btn" style="width: 100%; padding: 10px; cursor: pointer; background: #eee; border: 1px solid #999; font-family: inherit; font-weight: bold;">投稿する</button>
          <p id="send-status" style="font-size: 12px; margin-top: 10px; text-align: center; min-height: 1.2em; font-weight: bold;"></p>
        </div>
      </section>
    </div>
    
    <footer><p>© 2026 ゆきだま. All rights reserved.</p></footer>
  </div>

  <script src="js/load-sidebar.js"></script>

  <script>
    const nameInput = document.getElementById('post-name');
    const nameCount = document.getElementById('name-count');
    const msgInput = document.getElementById('post-message');
    const msgCount = document.getElementById('message-count');

    nameInput.addEventListener('input', () => {
      const len = nameInput.value.length;
      nameCount.innerText = `${len}/20`;
      nameCount.className = len > 20 ? "char-count char-over" : "char-count";
    });

    msgInput.addEventListener('input', () => {
      const len = msgInput.value.length;
      msgCount.innerText = `${len}/300`;
      msgCount.className = len > 300 ? "char-count char-over" : "char-count";
    });

    function scrollToPost(no) {
      const target = document.querySelector(`.post[data-no="${no}"]`);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.style.backgroundColor = "#fff9c4";
        setTimeout(() => { target.style.backgroundColor = ""; }, 1500);
      }
    }
    
function loadBBSLogs() {
      const displayArea = document.getElementById('bbs-display-area');
      const countDisplay = document.getElementById('post-count');
      
      displayArea.innerHTML = `
        <div class="status-msg">
          <img src="bbs_parts/loading.gif" alt="" style="vertical-align:middle; margin-right:8px; height:18px;">
          ログを読み込み中...
        </div>`;

      fetch('bbs_logs.html?t=' + new Date().getTime())
        .then(response => {
          if (!response.ok) throw new Error('ログファイルが見つかりません');
          return response.text();
        })
        .then(data => {
          displayArea.innerHTML = data.replace('CONTENTS_START', '');
          const posts = displayArea.querySelectorAll('.post');
          countDisplay.textContent = `(${posts.length}件)`;

          posts.forEach(post => {
            const no = post.getAttribute('data-no');
            
            // 右側に番号と返信ボタンを追加
            if (no && !post.querySelector('.post-header')) {
              const header = document.createElement('div');
              header.className = 'post-header';
header.innerHTML = `<div class="post-no">No.${no} <span class="reply-btn" onclick="insertAnchor('${no}')">[返信]</span></div>`;
              post.insertBefore(header, post.firstChild);
            }

            const body = post.querySelector('.post-body');
            if (body) {
              let html = body.innerHTML;
              const urlRegex = /(https?:\/\/[\w?=&.\/-;#~%-]+(?![\w?=&.\/-;#~%-]*">))/g;
              html = html.replace(urlRegex, (url) => `<a href="jump.html?url=${encodeURIComponent(url)}" target="_blank">${url}</a>`);
              html = html.replace(/(?:&gt;&gt;|>>)(\d+)/g, (match, p1) => {
                return `<span class="anchor-link" data-target="${p1}">>>${p1}</span>`;
              });
              body.innerHTML = html;
            }
          });

          displayArea.querySelectorAll('.anchor-link').forEach(link => {
            link.addEventListener('click', () => {
              scrollToPost(link.getAttribute('data-target'));
            });
          });
        })
        .catch(err => {
          displayArea.innerHTML = `
            <div class="status-msg" style="color:red;">
              <img src="bbs_parts/error.png" alt="" style="vertical-align:middle; margin-right:8px; height:18px;">
              読み込み失敗: ${err.message}
            </div>`;
        });
    }
    loadBBSLogs();

    async function submitToCloudflare() {
      const status = document.getElementById('send-status');
      const btn = document.getElementById('submit-btn');
      const name = nameInput.value.trim() || "名無しさん";
      const message = msgInput.value.trim();

      if (!message) { alert("内容を入力してください"); return; }
      
      btn.disabled = true;
      status.style.color = "#666";
      status.innerText = "送信中...";

      try {
        const response = await fetch('https://dry-silence-4f1f.y-bb0.workers.dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name, message: message })
        });

        if (response.ok) {
          status.style.color = "green";
          status.innerText = "投稿しました！反映にはしばらく時間がかかります";
          msgInput.value = "";
          msgCount.innerText = "0/300";
          setTimeout(() => { status.innerText = ""; }, 5000);
          loadBBSLogs();
        } else {
          // サーバーが返したエラーメッセージ（テキストまたはJSON）を取得
          let errorMessage = `エラー (${response.status})`;
          try {
            const errorData = await response.text();
            // WorkerがJSONを返す場合はパース、そうでなければテキストをそのまま使う
            try {
              const json = JSON.parse(errorData);
              errorMessage = json.message || json.error || errorData;
            } catch {
              errorMessage = errorData;
            }
          } catch (e) { /* ignore */ }
          
          throw new Error(errorMessage);
        }
} catch (e) {
        status.style.color = "red";
        const displayMsg = e.message.includes('Failed to fetch') ? "通信エラーが発生しました" : e.message;
        // ここにも error.png を追加
        status.innerHTML = `<img src="bbs_parts/error.png" alt="" style="vertical-align:middle; margin-right:5px; height:14px;"> 失敗: ${displayMsg}`;
      } finally {
        btn.disabled = false;
      }
    }

    /* サイドバーのリサイズ機能 */
    const resizer = document.getElementById('resizer');
    const sidebar = document.getElementById('sidebar');
    let isResizing = false;

    resizer.addEventListener('mousedown', function () {
      isResizing = true;
      document.body.style.cursor = 'ew-resize';
      document.body.style.userSelect = 'none'; 
    });

    document.addEventListener('mousemove', function (e) {
      if (!isResizing) return;
      const newWidth = e.clientX;
      if (newWidth > 100 && newWidth < 600) {
        sidebar.style.width = newWidth + 'px';
      }
    });

    document.addEventListener('mouseup', function () {
      isResizing = false;
      document.body.style.cursor = 'default';
      document.body.style.userSelect = 'auto';
    });

function insertAnchor(no) {
      const currentMsg = msgInput.value;
      const anchor = '>>' + no + '\n';
      
      // 先頭にアンカーを追加し、その後に元のメッセージを繋げる
      msgInput.value = anchor + currentMsg;
      
      msgInput.focus();
      // カーソルを末尾に移動（必要なければ削除してください）
      msgInput.setSelectionRange(msgInput.value.length, msgInput.value.length);
      
      msgInput.dispatchEvent(new Event('input'));
    }
  </script>
</body>
</html>

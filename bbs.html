<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>掲示板 - ゆきだまのホームページ A館</title>
  <style>
    body { margin: 0; padding: 0; font-family: "MS Gothic", "Osaka", monospace; background-image: url("images/pg.png"); background-repeat: repeat; background-size: 600px; color: #000000; height: 100vh; display: flex; overflow: hidden; }
    .sidebar { width: 200px; min-width: 100px; background-color: #ffffff; border-right: 1px solid #ccc; padding: 20px; font-size: 14px; box-sizing: border-box; flex-shrink: 0; }
    .resizer { width: 5px; cursor: ew-resize; background-color: #ccc; }
    .main { flex: 1; padding: 40px 20px; overflow-y: auto; background-color: rgba(255, 255, 255, 0.65); }
    .bbs-container { display: flex; gap: 32px; align-items: flex-start; max-width: 1200px; margin: 0 auto; }
    #bbs-log { flex: 1; background: rgba(255, 255, 255, 0.8); padding: 20px; border: 1px solid #999; border-radius: 4px; min-height: 800px; }
    .form-wrapper { width: 450px; position: sticky; top: 0; }

    .post { position: relative; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dotted #999; transition: background-color 0.5s; }
    .post-meta-right { float: right; text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .post-no { color: rgba(0, 0, 0, 0.3); font-size: 0.85em; font-weight: bold; }
    .post::after { content: ""; display: block; clear: both; }
    .post-body { display: block; margin-top: 8px; line-height: 1.6; white-space: pre-wrap; }

    /* アンカーリンクの見た目 */
    .anchor-link {
      color: #0000ee;
      text-decoration: underline;
      cursor: pointer;
      font-weight: bold;
    }
    .anchor-link:hover {
      color: #ff0000;
      background-color: #ffff00;
    }

    .reply-btn-in-post { font-size: 10px; cursor: pointer; padding: 1px 6px; background: #f8f8f8; border: 1px solid #ccc; border-radius: 2px; }
    h1, h2, h3 { text-align: center; }
    footer { margin-top: 40px; font-size: 12px; text-align: center; }
    .refresh-btn { cursor: pointer; padding: 4px 10px; font-size: 12px; background: #eee; border: 1px solid #999; }
    .status-msg { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; }
    .status-icon { width: 16px; height: 16px; object-fit: contain; }
    .char-count { text-align: right; font-size: 11px; color: #666; margin-top: 2px; }
    .char-over { color: red; font-weight: bold; }
    input, textarea, button { font-family: inherit; font-size: 14px; }
  </style>
</head>
<body>

  <nav class="sidebar" id="sidebar"></nav>
  <div class="resizer" id="resizer"></div>

  <div class="main">
    <h1>掲示板</h1>
    <hr style="width: 80%; margin: 20px auto;">

    <div class="bbs-container">
      <section id="bbs-log">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #ccc; padding-bottom: 5px;">
          <h3 style="margin: 0;">書き込み <span id="post-count" style="font-weight: normal; font-size: 0.9em;">(0件)</span></h3>
          <button type="button" class="refresh-btn" onclick="loadBBSLogs()">最新の情報に更新</button>
        </div>
        <div id="bbs-display-area"></div>
      </section>

      <section class="form-wrapper">
        <div style="background: rgba(255, 255, 255, 0.8); padding: 20px; border: 1px solid #999; border-radius: 4px;">
          <h3 style="margin-top:0;">新規投稿</h3>
          <p>名前：<br>
            <input type="text" id="post-name" placeholder="名無しさん" style="width: 100%; box-sizing: border-box; padding: 5px;">
            <div id="name-count" class="char-count">0/20</div>
          </p>
          <p>内容：<br>
            <textarea id="post-message" placeholder="メッセージを入力してください" style="width: 100%; height: 200px; box-sizing: border-box; padding: 5px; resize: vertical;"></textarea>
            <div id="message-count" class="char-count">0/300</div>
          </p>
          <button type="button" onclick="submitToCloudflare()" id="submit-btn" style="width: 100%; padding: 10px; cursor: pointer; background: #eee; border: 1px solid #999; font-family: inherit; font-weight: bold;">投稿する</button>
          <p id="send-status" style="font-size: 12px; margin-top: 10px; text-align: center; color: #666;"></p>
        </div>
      </section>
    </div>
    
    <footer><p>© 2026 ゆきだま. All rights reserved.</p></footer>
  </div>

  <script src="js/load-sidebar.js"></script>

  <script>
    const nameInput = document.getElementById('post-name');
    const msgInput = document.getElementById('post-message');
    const nameCount = document.getElementById('name-count');
    const msgCount = document.getElementById('message-count');

    // 文字数カウント
    nameInput.addEventListener('input', () => {
      const len = nameInput.value.length;
      nameCount.innerText = `${len}/20`;
      nameCount.className = len > 20 ? "char-count char-over" : "char-count";
    });

    msgInput.addEventListener('input', () => {
      const len = msgInput.value.length;
      msgCount.innerText = `${len}/300`;
      msgCount.className = len > 300 ? "char-count char-over" : "char-count";
    });

    // 返信ボタンの処理 (アンカーをテキストエリアに追加)
    function addReply(no) {
      const anchor = `>>${no}\n`;
      msgInput.value = anchor + msgInput.value;
      msgInput.focus();
      msgInput.dispatchEvent(new Event('input'));
    }

    // アンカークリック時のジャンプ処理
    function scrollToPost(no) {
      const target = document.querySelector(`.post[data-no="${no}"]`);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.style.backgroundColor = "#fff9c4"; // ハイライト
        setTimeout(() => { target.style.backgroundColor = ""; }, 1500);
      } else {
        alert("投稿 No." + no + " は見つかりませんでした。");
      }
    }

    function loadBBSLogs() {
      const displayArea = document.getElementById('bbs-display-area');
      const countDisplay = document.getElementById('post-count');
      displayArea.innerHTML = '<div class="status-msg"><img src="bbs_parts/loading.gif" class="status-icon">ログを読み込み中...</div>';

      fetch('bbs_logs.html?t=' + new Date().getTime())
        .then(response => { if (!response.ok) throw new Error('Not Found'); return response.text(); })
        .then(data => {
          // CONTENTS_STARTを除去して挿入
          displayArea.innerHTML = data.replace('CONTENTS_START', '');

          const posts = displayArea.querySelectorAll('.post');
          posts.forEach(post => {
            const num = post.getAttribute('data-no');
            if (num) {
              let metaArea = post.querySelector('.post-meta-right') || document.createElement('div');
              metaArea.className = 'post-meta-right';
              post.prepend(metaArea);

              // No.表示の追加
              if (!metaArea.querySelector('.post-no')) {
                const noSpan = document.createElement('span');
                noSpan.className = 'post-no';
                noSpan.innerText = `No.${num}`;
                metaArea.appendChild(noSpan);
              }

              // 返信ボタンの追加
              if (!metaArea.querySelector('.reply-btn-in-post')) {
                const replyBtn = document.createElement('button');
                replyBtn.type = "button";
                replyBtn.className = 'reply-btn-in-post';
                replyBtn.innerText = '返信';
                replyBtn.onclick = () => addReply(num);
                metaArea.appendChild(replyBtn);
              }
            }
          });

          countDisplay.textContent = `(${posts.length}件)`;

          // --- 本文の加工 (URLリンク化 & アンカーリンク化) ---
          const postBodies = displayArea.querySelectorAll('.post-body');
          postBodies.forEach(body => {
            let html = body.innerHTML;
            
            // 1. URLリンク化
            const urlRegex = /(https?:\/\/[\w?=&.\/-;#~%-]+(?![\w?=&.\/-;#~%-]*">))/g;
            html = html.replace(urlRegex, (url) => `<a href="jump.html?url=${encodeURIComponent(url)}" target="_blank">${url}</a>`);

            // 2. アンカーの「文字」をリンク用スパンに置換
            // &gt;&gt;1 などのエスケープ文字にも対応
            html = html.replace(/(?:&gt;&gt;|>>)(\d+)/g, (match, p1) => {
              return `<span class="anchor-link" data-target="${p1}">>>${p1}</span>`;
            });

            body.innerHTML = html;
          });

          // --- 3. リンク化した後にクリックイベントを一括で付与する ---
          displayArea.querySelectorAll('.anchor-link').forEach(link => {
            link.addEventListener('click', (e) => {
              const targetNo = link.getAttribute('data-target');
              scrollToPost(targetNo);
            });
          });

        })
        .catch(err => {
          displayArea.innerHTML = '<div class="status-msg">読み込みエラー</div>';
        });
    }
    
    // 初回読み込み
    loadBBSLogs();

    // Cloudflare Workersへの送信処理
    async function submitToCloudflare() {
      const status = document.getElementById('send-status');
      const btn = document.getElementById('submit-btn');
      const name = nameInput.value.trim() || "名無しさん";
      const message = msgInput.value.trim();
      
      if (!message) { alert("内容を入力してください"); return; }
      if (name.length > 20 || message.length > 300) { alert("文字数制限を超えています"); return; }

      status.style.color = "#666"; status.innerText = "送信中..."; btn.disabled = true;
      try {
        const response = await fetch('https://dry-silence-4f1f.y-bb0.workers.dev', {
          method: 'POST', mode: 'cors', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name, message: message })
        });
        if (response.ok) {
          status.style.color = "green"; status.innerText = "送信完了";
          msgInput.value = ""; 
          msgCount.innerText = "0/300"; 
          loadBBSLogs(); 
        } else { status.innerText = "エラー"; }
      } catch (e) { status.innerText = "失敗"; } finally { btn.disabled = false; }
    }
  </script>

  <script>
    // サイドバーのリサイズ機能
    const resizer = document.getElementById('resizer');
    const sidebar = document.getElementById('sidebar');
    let isResizing = false;
    resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.userSelect = 'none'; });
    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      if (e.clientX > 100 && e.clientX < 600) sidebar.style.width = e.clientX + 'px';
    });
    document.addEventListener('mouseup', () => { isResizing = false; document.body.style.userSelect = 'auto'; });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>掲示板 - ゆきだまのホームページ A館</title>
  <style>
    /* 既存スタイル */
    body { margin: 0; padding: 0; font-family: "MS Gothic", "Osaka", monospace; background-image: url("images/pg.png"); background-repeat: repeat; background-size: 600px; color: #000000; height: 100vh; display: flex; overflow: hidden; }
    .sidebar { width: 200px; min-width: 100px; background-color: #ffffff; border-right: 1px solid #ccc; padding: 20px; font-size: 14px; box-sizing: border-box; flex-shrink: 0; }
    .sidebar a { display: flex; align-items: center; margin-bottom: 12px; padding: 6px 0; color: blue; text-decoration: none; font-weight: bold; }
    .resizer { width: 5px; cursor: ew-resize; background-color: #ccc; }
    .main { flex: 1; padding: 40px 20px; overflow-y: auto; background-color: rgba(255, 255, 255, 0.65); }
    .bbs-container { display: flex; gap: 32px; align-items: flex-start; max-width: 1200px; margin: 0 auto; }
    #bbs-log { flex: 1; background: rgba(255, 255, 255, 0.8); padding: 20px; border: 1px solid #999; border-radius: 4px; min-height: 800px; }
    .form-wrapper { width: 450px; position: sticky; top: 0; }

    /* 投稿番号（JSで追加されるもの）のスタイル */
    .post { position: relative; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dotted #999; }
    .post-no { float: right; color: rgba(0, 0, 0, 0.2); font-size: 0.85em; font-family: monospace; font-weight: bold; }
    .post::after { content: ""; display: block; clear: both; }

    .post-body { display: block; margin-top: 8px; line-height: 1.6; white-space: pre-wrap; }
    .char-count { text-align: right; font-size: 11px; color: #666; margin-top: 2px; }
    .char-over { color: red; font-weight: bold; }
    .refresh-btn { cursor: pointer; padding: 4px 10px; font-size: 12px; background: #eee; border: 1px solid #999; }
  </style>
</head>
<body>
  <nav class="sidebar" id="sidebar"></nav>
  <div class="resizer" id="resizer"></div>
  <div class="main">
    <h1>掲示板</h1>
    <div class="bbs-container">
      <section id="bbs-log">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h3>書き込み <span id="post-count">(0件)</span></h3>
          <button type="button" class="refresh-btn" onclick="loadBBSLogs()">更新</button>
        </div>
        <div id="bbs-display-area"></div>
      </section>
      <section class="form-wrapper">
        <div style="background: white; padding: 20px; border: 1px solid #999;">
          <h3>新規投稿</h3>
          名前：<input type="text" id="post-name" style="width: 100%;"><div id="name-count" class="char-count">0/20</div>
          内容：<textarea id="post-message" style="width: 100%; height: 200px;"></textarea><div id="message-count" class="char-count">0/300</div>
          <button type="button" onclick="submitToCloudflare()" id="submit-btn" style="width: 100%; margin-top:10px;">投稿する</button>
          <p id="send-status" style="font-size: 12px; text-align: center;"></p>
        </div>
      </section>
    </div>
  </div>

  <script src="js/load-sidebar.js"></script>
  <script>
    const nameInput = document.getElementById('post-name');
    const msgInput = document.getElementById('post-message');

    // 文字数カウント
    [ [nameInput, 'name-count', 20], [msgInput, 'message-count', 300] ].forEach(([el, target, limit]) => {
      el.addEventListener('input', () => {
        const c = document.getElementById(target);
        c.innerText = `${el.value.length}/${limit}`;
        c.className = el.value.length > limit ? "char-count char-over" : "char-count";
      });
    });

    function loadBBSLogs() {
      fetch('bbs_logs.html?t=' + Date.now()).then(r => r.text()).then(data => {
        const area = document.getElementById('bbs-display-area');
        area.innerHTML = data.replace('CONTENTS_START', '');
        
        // No.を後付けする
        area.querySelectorAll('.post').forEach(post => {
          const no = post.getAttribute('data-no');
          if(no && !post.querySelector('.post-no')) {
            const span = document.createElement('span');
            span.className = 'post-no';
            span.innerText = `No.${no}`;
            post.prepend(span);
          }
        });
        document.getElementById('post-count').innerText = `(${area.querySelectorAll('.post').length}件)`;
      });
    }
    loadBBSLogs();

    async function submitToCloudflare() {
      const name = nameInput.value.trim() || "名無しさん";
      const message = msgInput.value.trim();
      if (!message || name.length > 20 || message.length > 300) return;
      
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      try {
        const res = await fetch('https://dry-silence-4f1f.y-bb0.workers.dev', {
          method: 'POST',
          body: JSON.stringify({ name, message })
        });
        if (res.ok) { loadBBSLogs(); msgInput.value = ""; }
      } finally { btn.disabled = false; }
    }
  </script>
</body>
</html>

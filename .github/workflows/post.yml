name: BBS Auto Update

on:
  repository_dispatch:
    types: [new-post]

jobs:
  update-html:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update BBS Log
        run: |
          NAME="${{ github.event.client_payload.name }}"
          MESSAGE="${{ github.event.client_payload.message }}"
          DATE=$(TZ=Asia/Tokyo date '+%Y/%m/%d %H:%M')

          # 永久欠番：ログから最大番号を探して+1する
          if [ -f bbs_logs.html ]; then
            MAX_NUM=$(grep -o 'No\.[0-9]\+' bbs_logs.html | sed 's/No\.//' | sort -n | tail -1)
            if [ -z "$MAX_NUM" ]; then
              NEW_NUM=1
            else
              NEW_NUM=$((MAX_NUM + 1))
            fi
          else
            NEW_NUM=1
          fi

          # 改行を<br>に変換
          FORMATTED_MSG=$(echo "${MESSAGE}" | sed ':a;N;$!ba;s/\n/<br>/g')

          # 投稿番号を右端に表示するためのHTML
          NEW_POST="<div class=\"post\"><span class=\"post-no\">No.${NEW_NUM}</span> <strong>${NAME}</strong> [${DATE}] <span class=\"post-body\">${FORMATTED_MSG}</span></div>"

          # CONTENTS_START という文字の直後に挿入
          sed -i "/CONTENTS_START/a ${NEW_POST}" bbs_logs.html

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add bbs_logs.html
          git commit -m "New post: No.${NEW_NUM}" || echo "No changes to commit"
          git push

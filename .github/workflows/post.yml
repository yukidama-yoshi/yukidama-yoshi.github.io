name: BBS Auto Update

on:
  repository_dispatch:
    types: [new-post]

jobs:
  update-html:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update BBS Log
        run: |
          NAME="${{ github.event.client_payload.name }}"
          MESSAGE="${{ github.event.client_payload.message }}"
          DATE=$(TZ=Asia/Tokyo date '+%Y/%m/%d %H:%M')

          # 最大番号を探して+1する
          if [ -f bbs_logs.html ]; then
            MAX_NUM=$(grep -o 'data-no="[0-9]\+"' bbs_logs.html | sed 's/data-no="//;s/"//' | sort -n | tail -1)
            [ -z "$MAX_NUM" ] && MAX_NUM=0
          else
            MAX_NUM=0
          fi
          NEW_NUM=$((MAX_NUM + 1))

          FORMATTED_MSG=$(echo "${MESSAGE}" | sed ':a;N;$!ba;s/\n/<br>/g')

          # ログには data-no 属性として数字だけを記録する
          NEW_POST="<div class=\"post\" data-no=\"${NEW_NUM}\"><strong>${NAME}</strong> [${DATE}] <span class=\"post-body\">${FORMATTED_MSG}</span></div>"

          sed -i "/CONTENTS_START/a ${NEW_POST}" bbs_logs.html

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add bbs_logs.html
          git commit -m "New post: No.${NEW_NUM}" || echo "No changes to commit"
          git push
